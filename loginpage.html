<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.cs">
</head>
<body>
    <div class="main-container">
    <div class="left-panel">
      <div class="logo">Servora</div>
      <div class="welcome">Hey There!</div>
      <div class="desc">Welcome Back.<br>Selesaikan tugas anda bersama kami.</div>
      <div style="margin-top:auto;">
        <div style="font-size:13px;opacity:0.7;">Belum punya akun?</div>
        <button class="signup-btn">Sign Up</button>
      </div>
    </div>
    <div class="right-panel">
      <div class="signin-title">SIGN IN</div>
      <form action="#" method="POST">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="wiswirwin@gmail.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required>
        </div>
        <div class="options">
          <label><input type="checkbox" name="remember"> Keep me logged in</label>
          <a href="#" class="forgot">Forgot Password?</a>
        </div>
        <button type="submit" class="signin-btn">Sign In</button>
      </form>
      <div class="social-login">Or, Use social media to sign in</div>
      <div class="social-icons">
        <a href="#" title="Sign in with Facebook" aria-label="Facebook"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M22.675 0h-21.35C.595 0 0 .592 0 1.326v21.348C0 23.408.595 24 1.325 24h11.495v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.797.143v3.24l-1.918.001c-1.504 0-1.797.715-1.797 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116C23.406 24 24 23.408 24 22.674V1.326C24 .592 23.406 0 22.675 0"/></svg></a>
        <a href="#" title="Sign in with Twitter" aria-label="Twitter"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557a9.93 9.93 0 0 1-2.828.775 4.932 4.932 0 0 0 2.165-2.724c-.951.564-2.005.974-3.127 1.195a4.916 4.916 0 0 0-8.38 4.482C7.691 8.095 4.066 6.13 1.64 3.161c-.542.929-.855 2.01-.855 3.17 0 2.188 1.115 4.116 2.823 5.245a4.904 4.904 0 0 1-2.229-.616c-.054 2.281 1.581 4.415 3.949 4.89a4.936 4.936 0 0 1-2.224.084c.627 1.956 2.444 3.377 4.6 3.417A9.867 9.867 0 0 1 0 21.543a13.94 13.94 0 0 0 7.548 2.209c9.058 0 14.009-7.496 14.009-13.986 0-.213-.005-.425-.014-.636A9.936 9.936 0 0 0 24 4.557z"/></svg></a>
        <a href="#" title="Sign in with LinkedIn" aria-label="LinkedIn"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M22.23 0H1.77C.792 0 0 .771 0 1.723v20.554C0 23.229.792 24 1.77 24h20.46c.978 0 1.77-.771 1.77-1.723V1.723C24 .771 23.208 0 22.23 0zM7.12 20.452H3.56V9.034h3.56v11.418zM5.34 7.691a2.065 2.065 0 1 1 0-4.13 2.065 2.065 0 0 1 0 4.13zm15.112 12.761h-3.554v-5.569c0-1.328-.027-3.037-1.85-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667h-3.554V9.034h3.414v1.561h.049c.476-.899 1.637-1.848 3.37-1.848 3.602 0 4.267 2.37 4.267 5.455v6.25z"/></svg></a>
      </div>
    </div>
  </div>
</body>
</html>
