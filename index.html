<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Servora</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }

    /* Sakura petals background */
    .sakura {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .petal {
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(255, 183, 197, 0.3);
      border-radius: 50% 0 50% 50%;
      animation: fall linear infinite;
    }

    .petal:nth-child(1) { left: 10%; animation-duration: 15s; animation-delay: 0s; }
    .petal:nth-child(2) { left: 25%; animation-duration: 18s; animation-delay: 2s; }
    .petal:nth-child(3) { left: 40%; animation-duration: 12s; animation-delay: 4s; }
    .petal:nth-child(4) { left: 55%; animation-duration: 20s; animation-delay: 1s; }
    .petal:nth-child(5) { left: 70%; animation-duration: 16s; animation-delay: 3s; }
    .petal:nth-child(6) { left: 85%; animation-duration: 14s; animation-delay: 5s; }
    .petal:nth-child(7) { left: 15%; animation-duration: 17s; animation-delay: 2.5s; }
    .petal:nth-child(8) { left: 60%; animation-duration: 19s; animation-delay: 0.5s; }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Login card */
    .login-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      position: relative;
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #ffb7c5, #ff8fab);
      border-radius: 0 0 3px 3px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      color: #fff;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255, 183, 197, 0.7);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .form-group input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 183, 197, 0.4);
      box-shadow: 0 0 0 3px rgba(255, 183, 197, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ffb7c5 0%, #ff8fab 100%);
      border: none;
      border-radius: 12px;
      color: #1a1a2e;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 183, 197, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .links {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .links a {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.3s ease;
    }

    .links a:hover {
      color: #ffb7c5;
    }

    /* Decorative wave */
    .wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      opacity: 0.1;
    }

    .wave path {
      fill: none;
      stroke: #ffb7c5;
      stroke-width: 2;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-container {
        margin: 20px;
        padding: 36px 24px;
      }

      .logo-text {
        font-size: 24px;
        letter-spacing: 6px;
      }
    }
  </style>
</head>
<body>
  <!-- Sakura petals -->
  <div class="sakura">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
  </div>

  <!-- Login form -->
  <div class="login-container">
    <div class="logo">
      <div class="logo-text">Servora</div>
      <div class="logo-sub">Welcome back</div>
    </div>

    <form action="#" method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="email@example.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login">Masuk</button>
    </form>

    <div class="links">
      <a href="#">Lupa password?</a>
      <a href="#">Buat akun</a>
    </div>
  </div>

  <!-- Decorative wave -->
  <svg class="wave" viewBox="0 0 1440 120" preserveAspectRatio="none">
    <path d="M0,60 C360,120 720,0 1080,60 C1260,90 1380,90 1440,60 L1440,120 L0,120 Z"></path>
  </svg>
</body>
</html>
